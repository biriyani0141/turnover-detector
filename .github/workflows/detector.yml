name: turnover-detector
# v3

on:
  schedule:
    # JST 17:00 = UTC 08:00、平日(月-金)のみ。
    # 祝日はmain.py内でスキップ判定する。
    - cron: "0 8 * * 1-5"
  workflow_dispatch:        # 手動実行ボタン(テスト用)
    inputs:
      force_run:
        description: "土日祝でも強制実行する"
        required: false
        default: "0"

permissions:
  contents: write           # data/ への git push に必要

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run detector
        env:
          NOTIFY: "discord"        # 'discord' | 'line' | 'console'
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TOP_N: "100"
          TOP_K: "100"
          MARKET: "tokyo"
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: python main.py

      - name: Save historical data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "data: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Publish ranking images to Pages
        run: |
          mkdir -p docs/images/latest
          for f in ranking_1.png ranking_2.png ranking_std_grt.png turnover.png; do
            [ -f /tmp/$f ] && cp /tmp/$f docs/images/latest/$f
          done
          if [ -f docs/images/latest/ranking_1.png ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/images/latest/updated_ranking.txt
          fi
          git add docs/images/latest/
          if ! git diff --staged --quiet; then
            git commit -m "docs: ranking images $(date -u +%Y-%m-%d)"
            git push
          fi
