name: themes-morning
# 米テーマ定時通知（JST 5:30〜7:30、10分おき、平日のみ）
# データ更新確認後、当日分になったら1回だけ送信

on:
  schedule:
    - cron: "30 20 * * 1-5"   # JST 5:30
    - cron: "40 20 * * 1-5"   # JST 5:40
    - cron: "50 20 * * 1-5"   # JST 5:50
    - cron:  "0 21 * * 1-5"   # JST 6:00
    - cron: "10 21 * * 1-5"   # JST 6:10
    - cron: "20 21 * * 1-5"   # JST 6:20
    - cron: "30 21 * * 1-5"   # JST 6:30
    - cron: "40 21 * * 1-5"   # JST 6:40
    - cron: "50 21 * * 1-5"   # JST 6:50
    - cron:  "0 22 * * 1-5"   # JST 7:00
    - cron: "10 22 * * 1-5"   # JST 7:10
    - cron: "20 22 * * 1-5"   # JST 7:20
    - cron: "30 22 * * 1-5"   # JST 7:30（最終試行・未更新でも送信）

  workflow_dispatch:
    inputs:
      force_send:
        description: "1=データ鮮度チェックをスキップして強制送信"
        required: false
        default: "0"

# 同時実行防止（送信済みフラグ確認の前に並走させない）
concurrency:
  group: themes-morning
  cancel-in-progress: false

permissions:
  contents: write   # data/ へのフラグ commit に必要

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install deps
        run: pip install requests Pillow

      - name: Run morning themes send
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_SEND: ${{ github.event.inputs.force_send || '0' }}
        run: python send_themes_morning.py

      - name: Commit sent flag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "themes: sent flag $(date -u +%Y-%m-%d)"
            git push
          fi
