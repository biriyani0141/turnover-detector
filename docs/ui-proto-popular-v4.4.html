<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
<title>監視銘柄発掘ツール</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #17171a; color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  /* タブ — アイコンのみ */
  .tabs {
    display: flex; border-bottom: 1px solid rgba(255,255,255,0.08);
    background: #17171a;
  }
  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 13px 0; position: relative; cursor: pointer;
  }
  .tab .material-symbols-rounded {
    font-size: 24px; color: #5f6368;
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    transition: color .18s ease;
  }
  .tab.active .material-symbols-rounded { color: #e3e3e3; }
  .tab.active::after {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%);
    bottom: -1px; width: 28px; height: 2px; background: #e3e3e3; border-radius: 2px;
  }

  .controls { padding: 14px 16px 8px; }

  /* 日付 */
  .date { font-size: 11px; color: #666; margin-bottom: 12px;
    font-family: ui-monospace, "SF Mono", monospace; }

  /* 日数: Flash型 独立カプセルピル */
  .seg {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .seg button {
    flex: 1; cursor: pointer;
    padding: 9px 0; border-radius: 9999px;
    background: #282a2d; border: 1px solid #3c4043; color: #8e8e93;
    font-size: 14px; font-weight: 500;
    font-family: ui-monospace, "SF Mono", monospace; font-variant-numeric: tabular-nums;
    transition: background .18s ease, color .18s ease, border-color .18s ease;
  }
  .seg button.active {
    background: #3c4043; border-color: #5f6368; color: #e8eaed; font-weight: 600;
  }

  /* 時価総額: 単一選択トグルチップ (白×黒モノトーン、「全部」廃止) */
  .cap-row { display: flex; gap: 6px; margin-bottom: 4px; }
  .cap-row button {
    flex: 1; border: none; background: #2c2c2e; color: #8e8e93; cursor: pointer;
    font-size: 13px; font-weight: 600; padding: 7px 0; border-radius: 8px;
    font-family: ui-monospace, "SF Mono", monospace; font-variant-numeric: tabular-nums;
    transition: background .2s ease, color .2s ease;
  }
  .cap-row button.active { background: #fff; color: #000; }

  /* 列ヘッダー (グリッドはリストと共通) */
  .grid {
    display: grid;
    grid-template-columns: 6rem max-content 1fr;
    column-gap: 2px;
    align-items: center;
  }
  .col-head {
    padding: 8px 16px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 11px; font-weight: 700; color: #888;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  .col-head .sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .col-head .sortable.on { color: #f5f5f5; }
  .arrow { font-size: 8px; margin-left: 1px; vertical-align: middle; }
  .perf-h { display: flex; width: 13rem; }
  .perf-h span { width: 2.6rem; text-align: right; padding-right: 3px; }
  .head-right { display: flex; flex-direction: column; align-items: flex-end; }
  .head-right .sortable { text-align: right; }

  /* リスト (v3そのまま) */
  .list > .row { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .row { padding: 4px 16px; }
  .row:nth-child(even) { background: rgba(255,255,255,0.015); }

  .left { min-width: 0; }
  .name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 13px; font-weight: 700; color: #f5f5f5; max-width: 6rem; letter-spacing: -0.01em;
  }
  .meta {
    white-space: nowrap; font-size: 11px; color: #777; margin-top: 1px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Noto Sans JP", sans-serif;
    font-weight: 400; letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .code { color: #c8c8c8; font-weight: 500; }

  .perf {
    display: flex; align-items: center; width: 13rem;
    font-size: 11px; font-weight: 700;
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums;
  }
  .perf span {
    width: 2.6rem; text-align: right; padding-right: 3px;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  .perf span:last-child { border-right: none; }

  .right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
  .price {
    font-size: 11px; font-weight: 600; color: #999; text-align: right; white-space: nowrap;
    font-family: ui-monospace, "SF Mono", monospace; font-variant-numeric: tabular-nums;
  }
  .occ { font-size: 10px; color: #777; margin-top: 1px;
    font-family: ui-monospace, "SF Mono", monospace; }
  .occ .hit { color: #ffa500; font-weight: 700; }

  .c-hot  { color: #ffa500; }
  .c-up   { color: #ff6b6b; }
  .c-down { color: #4ade80; }
  .c-flat { color: #777; }
  .c-null { color: #525252; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 1. タブ (アイコンのみ) -->
  <div class="tabs">
    <div class="tab"><span class="material-symbols-rounded">cycle</span></div>
    <div class="tab active"><span class="material-symbols-rounded">finance_mode</span></div>
    <div class="tab"><span class="material-symbols-rounded">electric_bolt</span></div>
  </div>

  <div class="controls">
    <!-- 3. 日付 -->
    <div class="date">2026-06-16</div>

    <!-- 2. 日数セグメント -->
    <div class="seg" id="seg">
      <button data-win="25" class="active">25</button>
      <button data-win="50">50</button>
      <button data-win="100">100</button>
      <button data-win="200">200</button>
    </div>

    <!-- 4. 時価総額フィルター (単一トグル、全部=未選択) -->
    <div class="cap-row" id="capRow">
      <button data-cap="100">100↓</button>
      <button data-cap="300">300↓</button>
      <button data-cap="1000">1000↓</button>
      <button data-cap="1000+">1000↑</button>
    </div>
  </div>

  <!-- 5. 列ヘッダー -->
  <div class="grid col-head">
    <div class="sortable" data-sort="name">銘柄<span class="arrow"></span></div>
    <div class="perf-h">
      <span class="sortable" data-sort="d1">1d<span class="arrow"></span></span>
      <span class="sortable" data-sort="d5">5d<span class="arrow"></span></span>
      <span class="sortable" data-sort="m1">1m<span class="arrow"></span></span>
      <span class="sortable" data-sort="m3">3m<span class="arrow"></span></span>
      <span class="sortable" data-sort="y1">1y<span class="arrow"></span></span>
    </div>
    <div class="head-right">
      <span>株価</span>
      <span class="sortable" data-sort="occ">出現<span class="arrow"></span></span>
    </div>
  </div>

  <!-- 6. リスト -->
  <div class="list" id="list"></div>
</div>

<script>
// IMG_8569 実データ (mktcapOku=億, occ="出現:S高")
const stocks = [
  { name:"ACSL",          code:"6232", mktcapOku:351,   price:"1,834",  periods:{d1:6.1,d5:-12,m1:-45,m3:11,y1:21},  occL:25, occR:1 },
  { name:"QDレーザ",       code:"6613", mktcapOku:1096,  price:"2,620",  periods:{d1:-5.4,d5:2,m1:0,m3:81,y1:956},     occL:25, occR:4 },
  { name:"日東紡績",       code:"3110", mktcapOku:8182,  price:"21,690", periods:{d1:11.5,d5:18,m1:1,m3:4,y1:332},     occL:25, occR:0 },
  { name:"Terra Drone",   code:"278A0",mktcapOku:853,   price:"8,750",  periods:{d1:20.7,d5:-3,m1:-30,m3:180,y1:61},  occL:25, occR:1 },
  { name:"アストロスケール",code:"186A0",mktcapOku:1869,  price:"1,375",  periods:{d1:-8.6,d5:-26,m1:-35,m3:23,y1:83},  occL:25, occR:2 },
  { name:"アクセルスペース",code:"402A0",mktcapOku:377,   price:"568",    periods:{d1:-2.1,d5:-16,m1:-21,m3:-11,y1:null},occL:25,occR:0 },
  { name:"日本電子材料",   code:"6855", mktcapOku:1172,  price:"7,990",  periods:{d1:-4,d5:12,m1:14,m3:22,y1:264},     occL:25, occR:0 },
  { name:"TOWA",          code:"6315", mktcapOku:2243,  price:"2,985",  periods:{d1:0,d5:5,m1:14,m3:19,y1:75},        occL:25, occR:0 },
  { name:"古河電気工業",   code:"5801", mktcapOku:33000, price:"46,130", periods:{d1:5,d5:-1,m1:-8,m3:68,y1:569},      occL:24, occR:0 },
  { name:"インフォメテック",code:"281A0",mktcapOku:36,    price:"615",    periods:{d1:-3,d5:12,m1:-27,m3:24,y1:0},      occL:24, occR:1 },
  { name:"ユニチカ",       code:"3103", mktcapOku:652,   price:"1,129",  periods:{d1:-1,d5:-11,m1:-20,m3:-10,y1:610},  occL:24, occR:1 },
  { name:"KLab",          code:"3656", mktcapOku:181,   price:"226",    periods:{d1:0,d5:-10,m1:-33,m3:-40,y1:93},    occL:24, occR:0 },
  { name:"キオクシアHD",   code:"285A0",mktcapOku:51700, price:"94,720", periods:{d1:4,d5:24,m1:90,m3:338,y1:4445},    occL:24, occR:1 },
  { name:"QPSホールディングス",code:"464A0",mktcapOku:1104,price:"2,280",periods:{d1:-2,d5:-14,m1:-36,m3:1,y1:null},   occL:24, occR:0 },
  { name:"アステリア",     code:"3853", mktcapOku:248,   price:"1,420",  periods:{d1:-1,d5:-19,m1:-21,m3:14,y1:131},   occL:24, occR:0 },
];

function fmtCap(oku){ return oku >= 10000 ? (oku/10000).toFixed(1)+"兆" : oku.toLocaleString("ja-JP")+"億"; }
function fmtCode(c){ return (/^\d{5}$/.test(c) && c.endsWith("0")) ? c.slice(0,4) : c; }
function perfClass(v){
  if (v === null) return "c-null";
  const r = Math.round(v);
  if (r >= 100) return "c-hot";
  if (r > 0) return "c-up";
  if (r < 0) return "c-down";
  return "c-flat";
}
function fmt(v){ return v === null ? "—" : Math.round(v) + "%"; }

// 状態
let capFilter = "all";
// sortKey: "name"(=turnover基準のリセット) / d1..y1 / "occ"(=S高)
// 初期 = turnover降順(出現回数の多い順)。銘柄列=リセット相当。
let sortKey = "name";
let sortDir = "desc";

const KEYS = ["d1","d5","m1","m3","y1"];

function applyCap(s){
  if (capFilter === "all") return true;
  if (capFilter === "100")  return s.mktcapOku <= 100;
  if (capFilter === "300")  return s.mktcapOku <= 300;
  if (capFilter === "1000") return s.mktcapOku <= 1000;
  if (capFilter === "1000+")return s.mktcapOku >= 1000;
  return true;
}

// ソート値: 銘柄=turnover(occL), 出現=S高(occR), 期間=ret値
function sortVal(s){
  if (sortKey === "name") return s.occL;   // turnover出現回数 = 初期/リセット並び
  if (sortKey === "occ")  return s.occR;   // S高基準
  return s.periods[sortKey];
}

function render(){
  let rows = stocks.filter(applyCap);
  // 銘柄(name)は常に降順=リセット。他列はsortDirに従う。null/欠損は常に末尾。
  const dir = (sortKey === "name") ? "desc" : sortDir;
  rows.sort((a,b) => {
    let va = sortVal(a), vb = sortVal(b);
    const na = (va===null||va===undefined);
    const nb = (vb===null||vb===undefined);
    if (na && nb) return 0;
    if (na) return 1;   // null は常に末尾
    if (nb) return -1;
    return dir==="asc" ? va-vb : vb-va;
  });

  document.getElementById("list").innerHTML = rows.map(s => `
    <div class="grid row">
      <div class="left">
        <div class="name">${s.name}</div>
        <div class="meta"><span class="code">${fmtCode(s.code)}</span> · ${fmtCap(s.mktcapOku)}</div>
      </div>
      <div class="perf">
        ${KEYS.map(k => `<span class="${perfClass(s.periods[k])}">${fmt(s.periods[k])}</span>`).join("")}
      </div>
      <div class="right">
        <span class="price">${s.price}</span>
        <span class="occ">${s.occL}:<span class="hit">${s.occR}</span></span>
      </div>
    </div>
  `).join("");

  // 矢印更新: 銘柄(リセット列)は▼▲を出さない。データ列のみアクティブ時に表示。
  document.querySelectorAll(".col-head .sortable").forEach(el => {
    const k = el.dataset.sort;
    const on = (k === sortKey);
    el.classList.toggle("on", on);
    const arrow = el.querySelector(".arrow");
    if (on && k !== "name") {
      arrow.textContent = (sortDir==="desc" ? "▼" : "▲");
    } else {
      arrow.textContent = "";
    }
  });
}

// セグメント
document.getElementById("seg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
});

// 時価総額: 単一選択トグル (再タップでOFF=全部)
document.getElementById("capRow").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  if (b.classList.contains("active")) {
    b.classList.remove("active");
    capFilter = "all";
  } else {
    document.querySelectorAll("#capRow button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    capFilter = b.dataset.cap;
  }
  render();
});

// 列ソート
document.querySelectorAll(".col-head .sortable").forEach(el => {
  el.addEventListener("click", () => {
    const k = el.dataset.sort;
    if (k === "name") {
      // 銘柄=リセット: turnover降順固定
      sortKey = "name"; sortDir = "desc";
    } else if (sortKey === k) {
      // 同じデータ列再タップ=昇降トグル
      sortDir = (sortDir==="desc" ? "asc" : "desc");
    } else {
      // 別のデータ列=その列の降順から
      sortKey = k; sortDir = "desc";
    }
    render();
  });
});

render();
</script>
</body>
</html>
